name: Remote Screenshot Capture
on:
  repository_dispatch:
    types: [capture-hero]

jobs:
  screenshot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Take 16:10 Screenshot
        run: |
          node -e "
          const puppeteer = require('puppeteer-extra');
          const StealthPlugin = require('puppeteer-extra-plugin-stealth');
          const fs = require('fs');
          const path = require('path');

          puppeteer.use(StealthPlugin());

          (async () => {
            let browser;
            try {
              browser = await puppeteer.launch({ 
                executablePath: '/usr/bin/google-chrome',
                headless: 'shell',
                args: ['--no-sandbox', '--disable-setuid-sandbox', '--disable-dev-shm-usage', '--disable-gpu'] 
              });
              
              const page = await browser.newPage();
              
              await page.setRequestInterception(true);
              page.on('request', (req) => {
                const url = req.url().toLowerCase();
                // BLOCKING COOKIE SCRIPTS: Prevents banners from even loading
                const isAdsOrConsent = ['google-analytics', 'cookiebot', 'onetrust', 'consent', 'analytics'].some(term => url.includes(term));
                
                if (['font', 'media'].includes(req.resourceType()) || isAdsOrConsent) {
                  req.abort();
                } else {
                  req.continue();
                }
              });

              await page.setViewport({ width: 1280, height: 800, deviceScaleFactor: 2 });
              
              await page.goto('${{ github.event.client_payload.url }}', { 
                waitUntil: 'networkidle2', 
                timeout: 60000 
              });

              // --- START COOKIE DISMISSAL LOGIC ---
              await page.evaluate(() => {
                const selectors = [
                  '#CybotCookiebotDialogBodyLevelButtonLevelOptinAllowallSelection', // Cookiebot (from your screenshot)
                  '[id*=\"reject\"]', '[id*=\"necessary\"]', '[class*=\"reject\"]', '[class*=\"necessary\"]',
                  'button[aria-label*=\"Reject\"]', 'button[aria-label*=\"Necessary\"]'
                ];
                
                selectors.forEach(selector => {
                  const element = document.querySelector(selector);
                  if (element) element.click();
                });

                // Force hide any lingering overlays
                const styles = document.createElement('style');
                styles.innerHTML = '[class*=\"cookie\"], [id*=\"cookie\"], [class*=\"consent\"], [id*=\"consent\"] { display: none !important; }';
                document.head.appendChild(styles);
              });
              // --- END COOKIE DISMISSAL LOGIC ---
              
              await new Promise(r => setTimeout(r, 4000));

              const dir = path.join(process.cwd(), 'public', 'captures');
              if (!fs.existsSync(dir)) fs.mkdirSync(dir, { recursive: true });
              
              const fileName = '${{ github.event.client_payload.id }}' + '.png';
              const filePath = path.join(dir, fileName);
              
              await page.screenshot({ path: filePath, optimizeForSpeed: true });
              
              console.log('✅ Captured successfully to: ' + filePath);
            } catch (e) {
              console.error('❌ Error:', e.message);
              process.exit(1);
            } finally {
              if (browser) await browser.close();
            }
          })();"

      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add public/captures/
          git commit -m "Capture: ${{ github.event.client_payload.id }}" || exit 0
          git pull --rebase origin main
          git push origin main