      - name: Take 16:10 Screenshot
        run: |
          node -e "
          const puppeteer = require('puppeteer');
          const fs = require('fs');
          (async () => {
            try {
              const browser = await puppeteer.launch({ 
                args: ['--no-sandbox', '--disable-setuid-sandbox', '--disable-dev-shm-usage'] 
              });
              const page = await browser.newPage();
              
              // Set viewport to 16:10 with high-res scale (Retina style)
              await page.setViewport({ 
                width: 1280, 
                height: 800, 
                deviceScaleFactor: 2 
              });
              
              console.log('Navigating to: ${{ github.event.client_payload.url }}');
              
              // 1. Fast load
              await page.goto('${{ github.event.client_payload.url }}', { 
                waitUntil: 'domcontentloaded', 
                timeout: 90000 
              });
              
              // 2. SMART WAIT: Wait for the Hero content to exist
              try {
                await page.waitForSelector('h1, h2, main, #hero', { timeout: 15000 });
                console.log('Found main content, waiting for animations...');
              } catch (e) {
                console.log('Could not find specific hero selector, proceeding anyway.');
              }

              // 3. THE MAGIC PAUSE: Give animations (like Walrus waves) time to finish
              await new Promise(resolve => setTimeout(resolve, 5000));
              
              // Ensure directory exists
              if (!fs.existsSync('public/captures')) {
                fs.mkdirSync('public/captures', { recursive: true });
              }
              
              const path = 'public/captures/${{ github.event.client_payload.id }}.png';
              
              // Use fullPage: false to keep it exactly 16:10
              await page.screenshot({ path: path });
              
              await browser.close();
              console.log('✅ Captured successfully');
            } catch (e) {
              console.error('❌ Error:', e.message);
              process.exit(1);
            }
          })();"

      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add public/captures/
          git commit -m "Capture: ${{ github.event.client_payload.url }}" || echo "No changes"
          git push