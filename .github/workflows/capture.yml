name: Remote Screenshot Capture
on:
  repository_dispatch:
    types: [capture-hero]

jobs:
  screenshot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Puppeteer and Chrome
        run: |
          npm install puppeteer
          # This specifically downloads the Chrome binary into the runner
          npx puppeteer browsers install chrome


      - name: Take 16:10 Screenshot
        run: |
          node -e "
          const puppeteer = require('puppeteer');
          const fs = require('fs');
          (async () => {
            try {
              const browser = await puppeteer.launch({ 
                args: ['--no-sandbox', '--disable-setuid-sandbox', '--disable-dev-shm-usage'] 
              });
              const page = await browser.newPage();
              
              // FIX 1: Disguise as a real browser to bypass bot-checks
              await page.setUserAgent('Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36');

              await page.setViewport({ 
                width: 1280, 
                height: 800, 
                deviceScaleFactor: 2 
              });
              
              console.log('Navigating to: ${{ github.event.client_payload.url }}');
              
              // FIX 2: Use 'load' instead of 'domcontentloaded' for these heavy sites
              await page.goto('${{ github.event.client_payload.url }}', { 
                waitUntil: 'load', 
                timeout: 90000 
              });
              
              // FIX 3: Force a tiny scroll. This 'wakes up' many lazy-load animations
              await page.evaluate(() => window.scrollBy(0, 50));
              await new Promise(resolve => setTimeout(resolve, 500));
              await page.evaluate(() => window.scrollBy(0, -50));

              // 2. SMART WAIT: Looking for visible content
              try {
                await page.waitForSelector('h1, h2, main, #hero', { visible: true, timeout: 15000 });
                console.log('Found main content, waiting for animations...');
              } catch (e) {
                console.log('Could not find specific hero selector, proceeding anyway.');
              }

              // FIX 4: Increased to 8 seconds. This is the sweet spot for Linear/Databricks
              await new Promise(resolve => setTimeout(resolve, 8000));
              
              if (!fs.existsSync('public/captures')) {
                fs.mkdirSync('public/captures', { recursive: true });
              }
              
              const path = 'public/captures/${{ github.event.client_payload.id }}.png';
              
              // Take the screenshot
              await page.screenshot({ path: path });
              
              await browser.close();
              console.log('✅ Captured successfully');
            } catch (e) {
              console.error('❌ Error:', e.message);
              process.exit(1);
            }
          })();"

      # - name: Commit and Push
      #   run: |
      #     git config --global user.name 'github-actions[bot]'
      #     git config --global user.email 'github-actions[bot]@users.noreply.github.com'
      #     git add public/captures/
      #     git commit -m "Capture: ${{ github.event.client_payload.url }}" || echo "No changes"
      #     git push

      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # 1. Add the new images
          git add public/captures/
          
          # 2. Commit (only if there are changes)
          git commit -m "Capture: ${{ github.event.client_payload.url }}" || exit 0
          
          # 3. THE FIX: Pull any changes you made while the action was running
          # --rebase ensures the bot's screenshot is added AFTER your latest code
          git pull --rebase origin main
          
          # 4. Push safely
          git push origin main