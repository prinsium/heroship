name: Remote Screenshot Capture
on:
  repository_dispatch:
    types: [capture-hero]
  schedule:
    # Runs at 00:00 on day 1 of every second month (Approx every 60 days)
    - cron: '0 0 1 */2 *'

jobs:
  screenshot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Dependencies
        run: |
          npm install puppeteer
          npx puppeteer browsers install chrome

      # Scenario A: Running automatically on a schedule for ALL links
      # It hits your live project endpoint to get the list of active links dynamically
      - name: Fetch and Capture Bulk Scheduled Screenshots
        if: github.event_name == 'schedule'
        run: |
          node -e "
          const puppeteer = require('puppeteer');
          const fs = require('fs');
          (async () => {
            try {
              // Replace this URL with your live deployed URL once hosted
              const response = await fetch('http://localhost:3000/api/heroship?limit=100');
              const data = await response.json();
              if (!data.docs || data.docs.length === 0) return console.log('No links found.');

              const browser = await puppeteer.launch({ args: ['--no-sandbox', '--disable-setuid-sandbox'] });
              const page = await browser.newPage();
              await page.setViewport({ width: 1280, height: 800 });

              if (!fs.existsSync('public/captures')) fs.mkdirSync('public/captures', { recursive: true });

              for (const hero of data.docs) {
                console.log('Refreshing: ' + hero.link);
                try {
                  await page.goto(hero.link, { waitUntil: 'networkidle2', timeout: 60000 });
                  
                  // BANNER NUKE FUNCTION
                  await page.evaluate(() => {
                    const selectors = ['[id*=\"cookie\"]', '[class*=\"cookie\"]', '[id*=\"banner\"]', '[class*=\"banner\"]', '[class*=\"modal\"]', '[class*=\"popup\"]'];
                    selectors.forEach(s => document.querySelectorAll(s).forEach(el => {
                      if (!['HEADER', 'BODY', 'HTML', 'MAIN'].includes(el.tagName)) el.remove();
                    }));
                  });

                  await page.screenshot({ path: 'public/captures/' + hero.id + '.png' });
                } catch (err) {
                  console.error('Failed to capture ' + hero.name, err.message);
                }
              }
              await browser.close();
            } catch (e) {
              console.error(e);
              process.exit(1);
            }
          })();"

      # Scenario B: Running instantly on a single link dispatch when you hit save
      # (Single-link manual dispatch triggers inside the GitHub environment)
      - name: Take Instant 16:10 Screenshot
        if: github.event_name == 'repository_dispatch'
        run: |
          node -e "
          const puppeteer = require('puppeteer');
          const fs = require('fs');
          (async () => {
            try {
              const browser = await puppeteer.launch({ args: ['--no-sandbox', '--disable-setuid-sandbox', '--disable-dev-shm-usage'] });
              const page = await browser.newPage();
              await page.setViewport({ width: 1280, height: 800 });
              
              console.log('Navigating to: ${{ github.event.client_payload.url }}');
              await page.goto('${{ github.event.client_payload.url }}', { waitUntil: 'networkidle2', timeout: 60000 });
              
              // BANNER NUKE FUNCTION
              await page.evaluate(() => {
                const selectors = ['[id*=\"cookie\"]', '[class*=\"cookie\"]', '[id*=\"banner\"]', '[class*=\"banner\"]', '[class*=\"modal\"]', '[class*=\"popup\"]'];
                selectors.forEach(s => document.querySelectorAll(s).forEach(el => {
                  if (!['HEADER', 'BODY', 'HTML', 'MAIN'].includes(el.tagName)) el.remove();
                }));
              });

              if (!fs.existsSync('public/captures')) fs.mkdirSync('public/captures', { recursive: true });
              
              const path = 'public/captures/${{ github.event.client_payload.id }}.png';
              await page.screenshot({ path: path });
              await browser.close();
              console.log('✅ Captured clean screenshot successfully');
            } catch (e) {
              console.error('❌ Error:', e.message);
              process.exit(1);
            }
          })();"

      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add public/captures/
          git commit -m "Automated Capture Update" || echo "No changes to commit"
          git push