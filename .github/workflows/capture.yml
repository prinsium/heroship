name: Remote Screenshot Capture
on:
  repository_dispatch:
    types: [capture-hero]
  schedule:
    # Runs at 00:00 on day 1 of every second month (approx. every 60 days)
    - cron: '0 0 1 */2 *'

jobs:
  screenshot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: |
          npm ci || npm install puppeteer-extra puppeteer-extra-plugin-stealth

      - name: Take 16:10 Screenshot
        run: |
          node -e "
          const puppeteer = require('puppeteer-extra');
          const StealthPlugin = require('puppeteer-extra-plugin-stealth');
          const fs = require('fs');
          const path = require('path');

          puppeteer.use(StealthPlugin());

          (async () => {
            let browser;
            try {
              setTimeout(() => { 
                console.error('⏳ Runner took too long. Terminating script safely.'); 
                process.exit(1); 
              }, 45000);

              browser = await puppeteer.launch({ 
                executablePath: '/usr/bin/google-chrome',
                headless: 'shell',
                args: ['--no-sandbox', '--disable-setuid-sandbox', '--disable-dev-shm-usage', '--disable-gpu'] 
              });
              
              const page = await browser.newPage();
              await page.setDefaultNavigationTimeout(30000);
              await page.setViewport({ width: 1280, height: 800, deviceScaleFactor: 2 });

              await page.setRequestInterception(true);
              page.on('request', (req) => {
                const url = req.url().toLowerCase();
                const resourceType = req.resourceType();
                
                const blockTerms = [
                  'google-analytics', 'analytics', 'cookiebot', 'onetrust', 'cookie-law', 
                  'consent', 'gtm.js', 'adsbygoogle', 'facebook.net', 'trustarc'
                ];
                
                const shouldBlock = blockTerms.some(term => url.includes(term)) || ['font', 'media'].includes(resourceType);

                if (shouldBlock) {
                  req.abort();
                } else {
                  req.continue();
                }
              });

              const targetUrl = '${{ github.event.client_payload.url }}' || process.env.FALLBACK_URL;
              const fileId = '${{ github.event.client_payload.id }}' || process.env.FALLBACK_ID;

              console.log('🌐 Navigating to:', targetUrl);
              
              await page.goto(targetUrl, { 
                waitUntil: 'load'
              });

              // FIXED: The CSS block is written cleanly on one single line now to make bash look right past it.
              await page.evaluate(() => {
                const styles = document.createElement('style');
                styles.innerHTML = '[class*=\"cookie\"],[id*=\"cookie\"],[class*=\"consent\"],[id*=\"consent\"],[class*=\"modal\"],[id*=\"modal\"],[class*=\"popup\"],[id*=\"popup\"],[class*=\"overlay\"],[id*=\"overlay\"],[id*=\"sp_message_container\"],.app-banner,.announcement-banner,#onetrust-banner-sdk,#didomi-popup,div[role=\"dialog\"],div[aria-modal=\"true\"]{display:none !important;opacity:0 !important;pointer-events:none !important;} body,html{overflow:auto !important;position:static !important;}';
                document.head.appendChild(styles);
              });
              
              console.log('⏱️ Settling layout graphics...');
              await new Promise(r => setTimeout(r, 5000));

              const dir = path.join(process.cwd(), 'public', 'captures');
              if (!fs.existsSync(dir)) fs.mkdirSync(dir, { recursive: true });
              
              const fileName = fileId + '.webp';
              const filePath = path.join(dir, fileName);
              
              await page.screenshot({ path: filePath, type: 'webp', quality: 75, optimizeForSpeed: true });
              console.log('✅ Captured successfully to: ' + filePath);

            } catch (e) {
              console.error('❌ Error caught:', e.message);
              process.exit(1);
            } finally {
              if (browser) await browser.close();
            }
          })();"
        env:
          FALLBACK_URL: 'https://example.com'
          FALLBACK_ID: 'hero-screenshot'

      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add public/captures/
          git commit -m "Capture Update: Auto-renewal [skip ci]" || exit 0
          git pull --rebase origin main
          git push origin main