name: Remote Screenshot Capture
on:
  repository_dispatch:
    types: [capture-hero]

jobs:
  screenshot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Puppeteer and Chrome
        run: |
          npm install puppeteer
          # This specifically downloads the Chrome binary into the runner
          npx puppeteer browsers install chrome

