name: Remote Screenshot Capture
on:
  repository_dispatch:
    types: [capture-hero]
  schedule:
    # Runs at 00:00 on day 1 of every second month (approx. every 60 days)
    - cron: '0 0 1 */2 *'

jobs:
  screenshot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: |
          npm ci || npm install puppeteer-extra puppeteer-extra-plugin-stealth @cliqz/adblocker-puppeteer cross-fetch

      - name: Take 16:10 Screenshot
        run: |
          node -e "
          const puppeteer = require('puppeteer-extra');
          const StealthPlugin = require('puppeteer-extra-plugin-stealth');
          const { PuppeteerBlocker } = require('@cliqz/adblocker-puppeteer');
          const fetch = require('cross-fetch');
          const fs = require('fs');
          const path = require('path');

          puppeteer.use(StealthPlugin());

          (async () => {
            let browser;
            try {
              browser = await puppeteer.launch({ 
                executablePath: '/usr/bin/google-chrome',
                headless: 'shell',
                args: ['--no-sandbox', '--disable-setuid-sandbox', '--disable-dev-shm-usage', '--disable-gpu'] 
              });
              
              const page = await browser.newPage();
              
              // 1. ROBUST BANNER & POP-UP BLOCKING
              // This fetches the popular Easylist + Easyprivacy lists to block cookie banners entirely
              const blocker = await PuppeteerBlocker.fromPrebuiltAdsAndTracking(fetch);
              await blocker.enableBlockingInPage(page);

              await page.setViewport({ width: 1280, height: 800, deviceScaleFactor: 2 });
              
              // Handle fallback values if triggered by GitHub Schedule instead of Repository Dispatch
              const targetUrl = '${{ github.event.client_payload.url }}' || process.env.FALLBACK_URL || 'https://example.com';
              const fileId = '${{ github.event.client_payload.id }}' || process.env.FALLBACK_ID || 'default-hero';

              await page.goto(targetUrl, { 
                waitUntil: 'networkidle2', 
                timeout: 90000 
              });

              // 2. EXTRA INSURANCE: Hide lingering modal wrappers via CSS injection
              await page.evaluate(() => {
                const styles = document.createElement('style');
                styles.innerHTML = `
                  [class*=\"cookie\"], [id*=\"cookie\"], [class*=\"consent\"], [id*=\"consent\"],
                  [class*=\"modal\"], [id*=\"modal\"], [class*=\"popup\"], [id*=\"popup\"],
                  .app-banner, .announcement-banner, #onetrust-banner-sdk { 
                    display: none !important; pointer-events: none !important; 
                  }
                  body, html { overflow: auto !important; }
                `;
                document.head.appendChild(styles);
              });
              
              await new Promise(r => setTimeout(r, 4000));

              const dir = path.join(process.cwd(), 'public', 'captures');
              if (!fs.existsSync(dir)) fs.mkdirSync(dir, { recursive: true });
              
              const fileName = fileId + '.webp';
              const filePath = path.join(dir, fileName);
              
              await page.screenshot({ path: filePath, type: 'webp', quality: 75, optimizeForSpeed: true });
              
              console.log('✅ Captured successfully to: ' + filePath);
            } catch (e) {
              console.error('❌ Error:', e.message);
              process.exit(1);
            } finally {
              if (browser) await browser.close();
            }
          })();"
        env:
          # OPTIONAL: Define default values here if you want the 60-day cron 
          # to look at a specific target when no client_payload is provided.
          FALLBACK_URL: 'https://yourdefaultwebsite.com'
          FALLBACK_ID: 'hero-screenshot'

      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add public/captures/
          git commit -m "Capture Update: Auto-renewal" || exit 0
          git pull --rebase origin main
          git push origin main